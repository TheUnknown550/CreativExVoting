server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Uploaded project images (served from the shared uploads volume).
  location /uploads/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
  }

  location / {
    try_files $uri /index.html;
  }
}
