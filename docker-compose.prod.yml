services:
  postgres:
    image: postgres:17-alpine
    container_name: creativex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: creativex_voting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d creativex_voting"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: creativex-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/creativex_voting?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
      FRONTEND_URL: https://ceawardvote.magitecx.com
      MIGRATIONS_DIR: /app/backend/migrations
      SEED_DEMO_DATA: "true"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      ADMIN_DISPLAY_NAME: System Admin
    ports:
      - "127.0.0.1:8081:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: https://ceawardvote.magitecx.com/api
    container_name: creativex-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:4174:80"

volumes:
  postgres_data:
