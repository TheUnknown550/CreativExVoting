services:
  postgres:
    image: postgres:17-alpine
    container_name: creativex-postgres
    environment:
      POSTGRES_DB: creativex_voting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d creativex_voting"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: creativex-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/creativex_voting?sslmode=disable
      JWT_SECRET: change-me
      PORT: "8080"
      FRONTEND_URL: http://localhost:5173
      MIGRATIONS_DIR: /app/backend/migrations
      SEED_DEMO_DATA: "true"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: creativex-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
